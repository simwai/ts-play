<svg width="800" height="200" viewBox="0 0 800 200" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="grad1" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#1e1e2e;stop-opacity:1" />
      <stop offset="50%" style="stop-color:#313244;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#1e1e2e;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="textGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#cba6f7;stop-opacity:1" />
      <stop offset="50%" style="stop-color:#f5c2e7;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#89b4fa;stop-opacity:1" />
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="2.5" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>
  <rect width="800" height="200" fill="url(#grad1)" />
  <path d="M0 150 Q 200 100 400 150 T 800 150" stroke="#cba6f7" stroke-width="2" fill="none" opacity="0.3" />
  <path d="M0 170 Q 200 120 400 170 T 800 170" stroke="#f5c2e7" stroke-width="1" fill="none" opacity="0.2" />
  <text x="50%" y="45%" dominant-baseline="middle" text-anchor="middle" font-family="monospace" font-size="60" font-weight="bold" fill="url(#textGrad)" filter="url(#glow)">TSPLAY</text>
  <text x="50%" y="70%" dominant-baseline="middle" text-anchor="middle" font-family="monospace" font-size="18" fill="#cdd6f4" opacity="0.8">Cognitive Playground for Modern Minds</text>
  <rect x="0" y="0" width="800" height="200" fill="none" stroke="#45475a" stroke-width="2" />
</svg>